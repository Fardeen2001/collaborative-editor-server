# fly.toml app configuration file generated for collaborative-editor-server on 2026-07-09T05:37:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'collaborative-editor-server'
primary_region = 'iad'

[build]

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
