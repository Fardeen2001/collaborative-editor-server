# fly.toml app configuration file for collaborative-editor-server
# See https://fly.io/docs/reference/configuration/

app = 'collaborative-editor-server'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'
  HOST = '0.0.0.0'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
